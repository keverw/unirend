<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Unirend SSR Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html.dark,
      html.dark body {
        background: #1a1a1a;
        color: rgba(255, 255, 255, 0.87);
        color-scheme: dark;
      }
    </style>
    <!-- Flash prevention: applies the correct dark class before the page renders.
         Cookie is preferred over __FRONTEND_REQUEST_CONTEXT__ — the cookie reflects the
         user's last explicit choice and is more up-to-date. The context value is read at
         request time for SSR (so a change in another tab mid-request can leave them out of sync).
         Falls back to the OS preference via matchMedia when neither is set. -->
    <script>
      (function () {
        const valid = ['light', 'dark', 'auto'];
        const cookieMatch = document.cookie.match(
          /(?:^|;\s*)themePreference=([^;]+)/,
        );

        const cookiePref = valid.includes(cookieMatch?.[1])
          ? cookieMatch[1]
          : null;

        const pref =
          cookiePref ||
          window.__FRONTEND_REQUEST_CONTEXT__?.themePreference ||
          'auto';

        const systemPrefersDark =
          typeof window.matchMedia === 'function' &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;

        const theme =
          pref === 'auto' ? (systemPrefersDark ? 'dark' : 'light') : pref;

        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <!--ss-head-->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  </head>
  <body>
    <!-- Noscript Warning: Displays a centered warning card with a blurred backdrop when JavaScript is disabled.
         Feel free to customize the styling below to match your project. -->
    <noscript>
      <style>
        .noscript-overlay {
          --noscript-accent: #ea580c; /* Darker orange warning accent for contrast */
          --noscript-accent-tint: #ffedd5; /* Solid light orange circle background (light) */
          --noscript-overlay-bg: rgba(
            15,
            23,
            42,
            0.6
          ); /* Dark semi-transparent backdrop for glassmorphism */
          --noscript-card-bg: rgba(
            255,
            255,
            255,
            0.12
          ); /* Glass card background */
          --noscript-border: 1px solid rgba(255, 255, 255, 0.25);
          --noscript-title-color: #ffffff; /* Title text */
          --noscript-message-color: rgba(255, 255, 255, 0.85); /* Body text */

          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          z-index: 99999;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
          background-color: var(--noscript-overlay-bg);
          backdrop-filter: blur(16px) saturate(180%);
          -webkit-backdrop-filter: blur(16px) saturate(180%);
          font-family: inherit;
        }
        .noscript-card {
          width: 100%;
          max-width: 440px;
          padding: 40px 36px;
          background-color: var(--noscript-card-bg);
          border: var(--noscript-border);
          border-radius: 16px;
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
          text-align: center;
        }
        /* Icon circle badge */
        .noscript-icon-wrap {
          width: 64px;
          height: 64px;
          margin: 0 auto 20px;
          border-radius: 50%;
          background-color: var(--noscript-accent-tint);
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .noscript-icon {
          width: 32px;
          height: 32px;
          color: var(--noscript-accent);
          display: block;
        }
        .noscript-title {
          font-size: 22px;
          font-weight: 700;
          margin: 0 0 10px;
          letter-spacing: -0.01em;
          color: var(--noscript-title-color);
        }
        .noscript-message {
          font-size: 15px;
          line-height: 1.6;
          margin: 0;
          color: var(--noscript-message-color);
        }

        /* Dark mode overrides (respects system preferences when JS is disabled) */
        @media (prefers-color-scheme: dark) {
          .noscript-overlay {
            --noscript-overlay-bg: rgba(
              0,
              0,
              0,
              0.75
            ); /* Black transparent overlay */
            --noscript-card-bg: #2d2d2d;
            --noscript-border: 1px solid #404040;
            --noscript-accent: #f97316; /* Orange warning accent for dark mode contrast */
            --noscript-accent-tint: rgba(249, 115, 22, 0.15); /* Orange tint */
            --noscript-title-color: rgba(255, 255, 255, 0.87);
            --noscript-message-color: rgba(255, 255, 255, 0.7);
          }
        }
      </style>
      <div class="noscript-overlay">
        <div class="noscript-card">
          <div class="noscript-icon-wrap">
            <!-- Warning triangle icon -->
            <svg class="noscript-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 3L1.5 21h21Z"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linejoin="round"
                stroke-linecap="round"
              />
              <rect
                x="11"
                y="10"
                width="2"
                height="5"
                rx="0.5"
                fill="currentColor"
              />
              <rect
                x="11"
                y="16.5"
                width="2"
                height="2"
                rx="0.5"
                fill="currentColor"
              />
            </svg>
          </div>
          <h3 class="noscript-title">JavaScript Required</h3>
          <p class="noscript-message">
            This page needs JavaScript to run. Please enable it in your browser
            settings and reload the page.
          </p>
        </div>
      </div>
    </noscript>
    <div id="root"><!--ss-outlet--></div>
    <script type="module" src="./EntryClient.tsx"></script>
  </body>
</html>
